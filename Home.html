<!DOCTYPE html>
<html>
<head>
    <title>Home - Hyacinth Onchangu Orioki</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: darkred;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        .download-btn {
            background-color: darkred;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            display: inline-block;
            margin-top: 15px;
        }

        .download-btn:hover {
            background-color: black;
        }

        iframe {
            margin-top: 20px;
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
        }

        .counter {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to My Portfolio</h1>

    <p>You can preview or download my CV below:</p>

    <!-- Download Button -->
    <a href="Hyacinth_CV.pdf" download class="download-btn" onclick="increaseCount()">
        Download CV
    </a>

    <!-- Download Counter -->
    <p class="counter">Downloads: <span id="count">0</span></p>

    <!-- CV Preview -->
    <iframe src="Hyacinth_CV.pdf"></iframe>

</div>

<script>
    // Simple counter using localStorage
    function increaseCount() {
        let count = localStorage.getItem("cv_downloads") || 0;
        count++;
        localStorage.setItem("cv_downloads", count);
        document.getElementById("count").innerText = count;
    }

    // Load count on page load
    window.onload = function() {
        let count = localStorage.getItem("cv_downloads") || 0;
        document.getElementById("count").innerText = count;
    }
</script>

</body>
</html>
